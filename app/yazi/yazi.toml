# see https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/yazi.toml

[opener]
edit = [
	{ run = 'nvim "%*"', desc = "nvim", block = true, for = "windows" },
	{ run = 'neovide %*', orphan = true, desc = "neovide", for = "windows" },
	{ run = 'vim "%*"', desc = "vim", block = true, for = "windows" },
	{ run = 'gvim %*',    orphan = true, desc = "gvim", for = "windows" },

]

[open]
prepend_rules = [
	{ name = "*.json", use = "edit" },

	# Multiple openers for a single rule
	{ name = "*.html", use = [ "open", "edit" ] },
]
append_rules = [
	{ name = "*", use = "my-fallback" },
]

[manager]
show_hidden = true
